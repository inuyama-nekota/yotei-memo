<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#dcecb0">
  <meta name="description" content="予定を大きく、簡単に確認できるスマホ向け予定メモ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="予定メモ">
  <meta name="format-detection" content="telephone=no">
  <title>予定メモ</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-app-version="2.3">
  <main class="app-shell">
    <header class="app-header">
      <h1>予定メモ</h1>
      <button id="openCreate" class="primary-button" type="button">新規作成</button>

      <div class="header-legend" aria-label="色分けの説明">
        <div class="legend-row"><span class="legend-chip legend-red"></span><span>赤＝1〜3日以内</span></div>
        <div class="legend-row"><span class="legend-chip legend-yellow"></span><span>黄＝4〜7日以内</span></div>
        <div class="legend-row"><span class="legend-chip legend-blue"></span><span>青＝7日以上先</span></div>
      </div>
    </header>

    <section aria-labelledby="schedule-heading">
      <h2 id="schedule-heading" class="sr-only">予定一覧</h2>
      <div id="emptyState" class="empty-state" hidden>
        予定はまだありません。<br>「新規作成」から追加してください。
      </div>
      <div id="scheduleList" class="schedule-list"></div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" hidden aria-hidden="true">
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">新しい予定を作成</h2>

      <form id="scheduleForm">
        <label class="field">
          <span>場所</span>
          <input id="place" name="place" type="text" maxlength="40"
                 autocomplete="off" placeholder="例：〇〇医院" required>
        </label>

        <label class="field">
          <span>日付</span>
          <div class="date-control">
            <input id="date" name="date" type="date" required>
            <output id="dateWeekday" class="weekday-display" aria-live="polite"></output>
          </div>
        </label>

        <fieldset class="field time-field">
          <legend>時間</legend>
          <div class="time-picker" aria-label="時間を選択">
            <select id="hour" name="hour" aria-label="時"></select>
            <span class="time-unit">時</span>
            <select id="minute" name="minute" aria-label="分"></select>
            <span class="time-unit">分〜</span>
          </div>
          <p class="field-hint">上下に動かして選べます。分は5分単位です。</p>
        </fieldset>

        <label class="field">
          <span>備考</span>
          <textarea id="memo" name="memo" maxlength="120"
                    placeholder="例：定期通院"></textarea>
        </label>

        <div class="modal-actions">
          <button id="cancelCreate" class="secondary-button" type="button">やめる</button>
          <button class="save-button" type="submit">保存する</button>
        </div>
      </form>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
